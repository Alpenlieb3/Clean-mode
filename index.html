<!DOCTYPE html>
<html>
<head>
  <title>YouTube Clean Mode</title>
  <style>
    body{
      font-family: Arial;
      background:#0f0f0f;
      color:white;
      text-align:center;
      padding-top:80px;
    }

    h1{
      margin-bottom:10px;
    }

    .btn{
      display:inline-block;
      padding:18px 28px;
      font-size:18px;
      background:#ff0000;
      color:white;
      border-radius:10px;
      text-decoration:none;
      cursor:grab;
      user-select:none;
      margin-top:20px;
    }

    .box{
      margin-top:30px;
      background:#1f1f1f;
      padding:20px;
      border-radius:10px;
      width:420px;
      margin-left:auto;
      margin-right:auto;
      text-align:left;
    }

    li{
      margin:8px 0;
    }
  </style>
</head>

<body>

<h1>🎬 YouTube Clean Mode</h1>
<p>Drag the button below to your bookmarks bar</p>

<a class="btn"
href="javascript:(()=>{YOUR_MINIFIED_BOOKMARKLET_HERE})()">
▶ Activate Clean Mode
</a>

<div class="box">
<h3>⚠ Important</h3>
<ul>
  <li>Bookmarks bar must be visible</li>
  <li>Works only when clicked on YouTube</li>
  <li>Best position: center of bookmarks bar for quick access</li>
</ul>
</div>

</body>
</html>
