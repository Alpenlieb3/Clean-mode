<!DOCTYPE html>
<html>
<head>
  <title>YouTube Clean Mode</title>

  <style>
    body{
      font-family: Arial;
      background:#0f0f0f;
      color:white;
      text-align:center;
      padding-top:80px;
    }

    .title{
      font-size:28px;
      margin-bottom:10px;
    }

    .subtitle{
      opacity:0.7;
      margin-bottom:30px;
    }

    /* DRAG BUTTON LOOK */
    .drag-btn{
      display:inline-block;
      padding:18px 28px;
      background:#ff0000;
      color:white;
      font-size:18px;
      border-radius:10px;
      text-decoration:none;
      cursor:grab;
      user-select:none;
    }

    .box{
      margin-top:40px;
      background:#1f1f1f;
      padding:20px;
      border-radius:10px;
      display:inline-block;
      max-width:500px;
      text-align:left;
    }
  </style>
</head>

<body>

<div class="title">🎬 YouTube Clean Mode</div>
<div class="subtitle">Drag the button to your bookmarks bar</div>

<!-- DRAGGABLE BOOKMARKLET -->
<a class="drag-btn"
href="javascript:(()=>{let s=document.getElementById('yt_clean_ui');if(s){s.remove();document.body.style.cursor='default';document.documentElement.style.cursor='default';}else{s=document.createElement('style');s.id='yt_clean_ui';s.textContent=`#movie_player{opacity:1!important;visibility:visible!important;}.ytp-chrome-top,.ytp-chrome-bottom,.ytp-gradient-top,.ytp-gradient-bottom,.ytp-progress-bar-container,.ytp-ce-element,.ytp-cards-button,.ytp-endscreen-content,.ytp-title,.ytp-title-text,.ytp-title-channel,.ytp-paid-content-overlay,.ytp-overlays-container,.ytp-fullscreen-quick-actions,.ytp-pause-overlay,.ytp-show-cards-title,#masthead,ytd-guide-renderer,ytd-comments{display:none!important;visibility:hidden!important;opacity:0!important;}html,body,*{cursor:default!important;}`;document.head.appendChild(s);} })();">
▶ Activate Clean Mode
</a>

<div class="box">
<h3>⚠ How to use</h3>
<ul>
  <li>Drag the red button to your bookmarks bar</li>
  <li>Make sure bookmarks bar is visible</li>
  <li>Go to YouTube</li>
  <li>Click the bookmark</li>
</ul>
</div>

</body>
</html>
