<button onclick="copyCode()" class="btn">
▶ Click to Copy Clean Mode Code
</button>

<script>
function copyCode(){
  const code = `javascript:(()=>{let s=document.getElementById('yt_clean_ui');if(s){s.remove();document.body.style.cursor='default';document.documentElement.style.cursor='default';}else{s=document.createElement('style');s.id='yt_clean_ui';s.textContent=\`
#movie_player{opacity:1!important;visibility:visible!important;}
.ytp-chrome-top,.ytp-chrome-bottom,.ytp-gradient-top,.ytp-gradient-bottom,.ytp-progress-bar-container,.ytp-ce-element,.ytp-cards-button,.ytp-endscreen-content,.ytp-title,.ytp-title-text,.ytp-title-channel,.ytp-paid-content-overlay,.ytp-overlays-container,.ytp-fullscreen-quick-actions,.ytp-pause-overlay,.ytp-show-cards-title,#masthead,ytd-guide-renderer,ytd-comments{display:none!important;visibility:hidden!important;opacity:0!important;}
html,body,*{cursor:default!important;}
\`;document.head.appendChild(s);} })();`;

  navigator.clipboard.writeText(code);
  alert("Copied! Now create a bookmark and paste it in URL field.");
}
</script>
