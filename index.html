<!DOCTYPE html>
<html>
<head>
  <title>YouTube Clean Mode</title>
  <style>
    body{
      font-family: Arial;
      text-align: center;
      margin-top: 80px;
      background: #0f0f0f;
      color: white;
    }

    .btn{
      display:inline-block;
      padding:15px 25px;
      background:#ff0000;
      color:white;
      font-size:18px;
      border-radius:10px;
      text-decoration:none;
      cursor:grab;
      user-select:none;
    }

    .box{
      margin-top:30px;
      padding:20px;
      background:#1f1f1f;
      border-radius:10px;
      display:inline-block;
      max-width:500px;
    }
  </style>
</head>
<body>

<h1>🎬 YouTube Clean Mode</h1>

<p>Drag this button to your bookmarks bar 👇</p>

<a class="btn"
href="javascript:(()=>{YOUR_MINIFIED_BOOKMARKLET})()">
▶ Activate Clean Mode
</a>

<div class="box">
<h3>⚠ Important</h3>
<ul style="text-align:left;">
  <li>Bookmarks bar must be visible</li>
  <li>Works only when you click the bookmark</li>
  <li>Open YouTube first, then click it</li>
</ul>
</div>

</body>
</html>
